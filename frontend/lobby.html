<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lobby</title>
  <link rel="stylesheet" href="lobby.css">
  <script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.0/dist/colyseus.js"></script>
  <script src="lobby.js"></script>
</head>
<body>
  <div class="container">
    <h1>Lobby</h1>
    <button id="createRoomBtn" class="btn">Create Room</button>
    <div style="margin:16px 0;">
      <input type="text" id="joinRoomId" placeholder="Enter Room ID" style="padding:8px; border-radius:6px; border:none; width:180px;" />
      <button id="joinRoomBtn" class="btn">Join Room</button>
    </div>
    <div id="roomList" class="room-list"></div>
  </div>
</body>
</html>
